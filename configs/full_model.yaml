# Full model: 3D-CNN + AE pretrained encoder + ConvLSTM + Attention + VAE.

experiment_name: full_model
seed: 42
fold: 0
n_folds: 5

data:
  root: data/training
  spacing: [1.25, 1.25, 10.0]
  spatial_size: [224, 224, 16]
  noise_std: 0.05
  rot_deg: 15.0

pretraining:
  enabled: true
  ae_checkpoint: checkpoints/ae_pretrain.pt
  epochs: 50
  noise_std: 0.1
  voxel_dropout: 0.2

model:
  in_channels: 1
  n_seg_classes: 4
  n_disease_classes: 5
  channels: [32, 64, 128, 256, 320]
  lstm_hidden: 64
  vae_latent_dim: 32
  use_convlstm: true
  use_attention: true
  use_vae: true
  dropout: 0.2

train:
  epochs: 100
  batch_size: 2
  grad_accum: 2
  optimizer:
    name: adam
    lr: 1.0e-4
    weight_decay: 1.0e-5
  scheduler:
    name: cosine
    warmup_epochs: 5
  loss:
    focal_weight: 0.5
    diagnosis_weight: 0.1
    vae_beta: 1.0e-3
  early_stopping:
    patience: 20
    metric: val_dice_mean

eval:
  metrics: [dice, hd95, balanced_accuracy]
  save_predictions: true
